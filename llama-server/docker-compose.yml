services:
  # --- The "Brain" ---
  roo-brain:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: code-brain
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0 # Force gfx1103 compatibility
      - GGML_HIP_VISIBLE_DEVICES=0
    ports:
      - "11435:11434"
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    volumes:
      - ${HOME}/Dokumente/Coding-AI/models:/root/.cache/huggingface/hub
    #  - ./devstral_template.jinja:/templates/devstral_template.jinja
    command:
      - "-hf"
      - "unsloth/Qwen3.5-35B-A3B-GGUF:MXFP4_MOE"
      - "--port"
      - "11434"
      - "--host"
      - "0.0.0.0"
      - "-c"
      - "65536"
      - "--cache-type-k"
      - "q8_0"
      - "--cache-type-v"
      - "q8_0"
      - "-ngl"
      - "99"
      - "--flash-attn"
      - "on"
      - "-b"
      - "512"
      - "-ub"
      - "512"
      - "--threads"
      - "8"
      - "--parallel"
      - "1"
      - "--temp"
      - "0.6"
      - "--top-p"
      - "0.95"
      - "--top-k"
      - "20"
      - "--min-p"
      - "0.0"
      - "--presence-penalty"
      - "0.0"
      - "--repeat-penalty"
      - "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '8'
        reservations:
          memory: 16G
          cpus: '4'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # --- The "Librarian" ---
  roo-embedder:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: code-embedder
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
    ports:
      - "11436:11434"
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    volumes:
      - ${HOME}/Dokumente/Coding-AI/models:/root/.cache/huggingface/hub
    command:
      - "-hf"
      - "Qwen/Qwen3-Embedding-0.6B-GGUF:Q8_0"
      - "--port"
      - "11434"
      - "--host"
      - "0.0.0.0"
      - "--embedding"
      - "-ngl"
      - "99"
      - "-c"
      - "8192"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11436/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
        reservations:
          memory: 4G
          cpus: '2'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # --- The "Archive" ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: code-archive
    ports:
      - "6333:6333"
    volumes:
      - ${HOME}/Dokumente/Coding-AI/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
        reservations:
          memory: 4G
          cpus: '2'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

networks:
  default:
    name: llama-network
    driver: bridge
